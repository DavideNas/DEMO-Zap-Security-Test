name: ZAP Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to scan'
        required: true
        default: 'https://juice-shop.herokuapp.com/'

permissions:
  contents: read
  issues: write

jobs:
  zap_scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ github.event.inputs.target_url || 'https://juice-shop.herokuapp.com/' }} # Using dynamic input!
          fail_action: false

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-final-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn