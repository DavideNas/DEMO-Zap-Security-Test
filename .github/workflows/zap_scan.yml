name: ZAP Security Scan

on: [push] # Each time you make a 'git push' on repo, test start automatically

permissions:
  contents: read
  issues: write # Required to allow ZAP to create the Issue in your repo

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Exec a ZAP scan
    steps:
      - name: Exec ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://juice-shop.herokuapp.com/'
          cmd_options: '-r report.html' # Tells ZAP to generate an HTML file
      
      - name: Upload the report as an artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report.html